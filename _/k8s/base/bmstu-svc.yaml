# bmstu-svc — Keycloak OIDC (pure HTTP) + LKS API. БД: bmstu_db.
---
apiVersion: v1
kind: Service
metadata:
  name: bmstu-svc
  namespace: fizcultor
spec:
  selector:
    app: bmstu-svc
  ports:
    - {name: grpc, port: 9090, targetPort: 9090}
    - {name: http, port: 8080, targetPort: 8080}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bmstu-svc
  namespace: fizcultor
  labels:
    app: bmstu-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bmstu-svc
  template:
    metadata:
      labels:
        app: bmstu-svc
    spec:
      containers:
        - name: bmstu-svc
          image: ghcr.io/virsi/fizcultor-bot/bmstu-svc:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: bmstu-svc
            - name: POSTGRES_DSN
              value: postgres://fizcultor:$(POSTGRES_PASSWORD)@postgres:5432/bmstu_db?sslmode=disable
          envFrom:
            - configMapRef: {name: fizcultor-config}
            - secretRef: {name: fizcultor-secrets}
          ports:
            - {name: grpc, containerPort: 9090}
            - {name: http, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits:   {cpu: 200m, memory: 128Mi}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true

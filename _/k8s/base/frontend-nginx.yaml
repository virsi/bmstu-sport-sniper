# frontend — Vue 3 SPA, отдаётся nginx-alpine. Image multi-stage:
# stage 1: pnpm build → dist/
# stage 2: nginx:alpine + dist/ копируется в /usr/share/nginx/html
#
# Dockerfile см. frontend/apps/web/Dockerfile (создаётся в CI/CD задаче).
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: fizcultor
spec:
  selector: {app: frontend}
  ports:
    - {name: http, port: 80, targetPort: 80}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: fizcultor
  labels: {app: frontend}
spec:
  replicas: 1
  selector: {matchLabels: {app: frontend}}
  template:
    metadata:
      labels: {app: frontend}
    spec:
      containers:
        - name: nginx
          image: ghcr.io/virsi/fizcultor-bot/frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 80}
          readinessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket: {port: http}
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits:   {cpu: 100m, memory: 64Mi}
          securityContext:
            runAsNonRoot: true
            # nginx:alpine default user 101 (nginx).
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL], add: [NET_BIND_SERVICE]}

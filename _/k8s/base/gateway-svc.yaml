# gateway-svc — BFF: REST + SSE для браузера. JWT middleware, gRPC к backends.
# Единственный HTTP-сервис, который Traefik IngressRoute публикует наружу.
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-svc
  namespace: fizcultor
spec:
  selector: {app: gateway-svc}
  ports:
    - {name: http, port: 8080, targetPort: 8080}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-svc
  namespace: fizcultor
  labels: {app: gateway-svc}
spec:
  # Gateway легко горизонтально масштабируется (stateless, SSE-state в
  # одной сессии). На single-node — пока 1 replica.
  replicas: 1
  selector: {matchLabels: {app: gateway-svc}}
  template:
    metadata:
      labels: {app: gateway-svc}
    spec:
      containers:
        - name: gateway-svc
          image: ghcr.io/virsi/fizcultor-bot/gateway-svc:dev
          imagePullPolicy: IfNotPresent
          env:
            - {name: SERVICE_NAME, value: gateway-svc}
          envFrom:
            - configMapRef: {name: fizcultor-config}
            - secretRef: {name: fizcultor-secrets}
          ports:
            - {name: http, containerPort: 8080}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 500m, memory: 256Mi}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true

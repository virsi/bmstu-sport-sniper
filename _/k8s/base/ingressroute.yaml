# Traefik IngressRoute — fizcultor.ru → frontend (статика) + /api → gateway.
# TLS получается через resolver `letsencrypt` (TLS-ALPN challenge на :443).
# IngressClass = fizcultor-traefik (см. traefik.yaml). Только наш namespace.

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: fizcultor
  namespace: fizcultor
spec:
  entryPoints: [websecure]
  routes:
    # 1) /api/* и /healthz → gateway-svc:8080
    - match: Host(`fizcultor.ru`) && (PathPrefix(`/api`) || PathPrefix(`/healthz`) || PathPrefix(`/readyz`))
      kind: Rule
      services:
        - name: gateway-svc
          port: 8080
          # SSE: keep connection open; Traefik по умолчанию TCP-keepalive.
          # Если будет 408/closed → добавить ResponseForwarding.FlushInterval.

    # 2) Всё остальное → frontend nginx (Vue SPA)
    - match: Host(`fizcultor.ru`)
      kind: Rule
      services:
        - name: frontend
          port: 80
  tls:
    certResolver: letsencrypt

---
# IngressRoute на :80 — Traefik сам редиректит web→websecure (см. args).
# Но ACME TLS-ALPN challenge приходит на :443 — без routing rule всё ok.

# Все 4 экспортёра в одном файле для краткости.
# node-exporter + cadvisor — DaemonSet (нужны на каждом ноде).
# postgres-exporter + nats-exporter — Deployment (sidecars).

# ============== node-exporter (DaemonSet) ==============
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: fizcultor
spec:
  clusterIP: None # headless — Prometheus сам резолвит все pod-IP
  selector: {app: node-exporter}
  ports:
    - {name: metrics, port: 9100, targetPort: 9100}

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: fizcultor
spec:
  selector: {matchLabels: {app: node-exporter}}
  template:
    metadata:
      labels: {app: node-exporter}
    spec:
      hostPID: true
      hostNetwork: true
      tolerations: [{operator: Exists}] # деплоится и на control-plane если есть
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          imagePullPolicy: IfNotPresent
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
            - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
          ports:
            - {name: metrics, containerPort: 9100, hostPort: 9100}
          volumeMounts:
            - {name: proc, mountPath: /host/proc, readOnly: true}
            - {name: sys, mountPath: /host/sys, readOnly: true}
            - {name: root, mountPath: /host/root, mountPropagation: HostToContainer, readOnly: true}
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits:   {cpu: 100m, memory: 64Mi}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
      volumes:
        - {name: proc, hostPath: {path: /proc}}
        - {name: sys,  hostPath: {path: /sys}}
        - {name: root, hostPath: {path: /}}

# ============== cAdvisor (DaemonSet) ==============
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: fizcultor
spec:
  clusterIP: None
  selector: {app: cadvisor}
  ports:
    - {name: metrics, port: 8080, targetPort: 8080}

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: fizcultor
spec:
  selector: {matchLabels: {app: cadvisor}}
  template:
    metadata:
      labels: {app: cadvisor}
    spec:
      tolerations: [{operator: Exists}]
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.49.1
          imagePullPolicy: IfNotPresent
          args:
            - --housekeeping_interval=15s
            - --disable_metrics=disk,udp,sched,process,hugetlb,tcp,advtcp,referenced_memory,cpu_topology,resctrl
            # Containerd socket вместо docker.sock (k0s use containerd).
            - --containerd=/run/containerd/containerd.sock
          ports:
            - {name: metrics, containerPort: 8080}
          volumeMounts:
            - {name: rootfs, mountPath: /rootfs, readOnly: true}
            - {name: var-run, mountPath: /var/run, readOnly: true}
            - {name: sys, mountPath: /sys, readOnly: true}
            - {name: containerd-sock, mountPath: /run/containerd/containerd.sock, readOnly: true}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 300m, memory: 256Mi}
          securityContext:
            privileged: true # cgroups доступ
      volumes:
        - {name: rootfs, hostPath: {path: /}}
        - {name: var-run, hostPath: {path: /var/run}}
        - {name: sys, hostPath: {path: /sys}}
        - {name: containerd-sock, hostPath: {path: /run/k0s/containerd.sock}}

# ============== postgres-exporter (Deployment) ==============
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: fizcultor
spec:
  selector: {app: postgres-exporter}
  ports:
    - {name: metrics, port: 9187, targetPort: 9187}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: fizcultor
spec:
  replicas: 1
  selector: {matchLabels: {app: postgres-exporter}}
  template:
    metadata:
      labels: {app: postgres-exporter}
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_NAME
              value: "host=postgres port=5432 user=fizcultor password=$(POSTGRES_PASSWORD) dbname=postgres sslmode=disable"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fizcultor-secrets
                  key: POSTGRES_PASSWORD
            - {name: PG_EXPORTER_AUTO_DISCOVER_DATABASES, value: "true"}
            - {name: PG_EXPORTER_EXCLUDE_DATABASES, value: "template0,template1"}
          ports:
            - {name: metrics, containerPort: 9187}
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits:   {cpu: 100m, memory: 64Mi}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}

# ============== nats-exporter (Deployment) ==============
---
apiVersion: v1
kind: Service
metadata:
  name: nats-exporter
  namespace: fizcultor
spec:
  selector: {app: nats-exporter}
  ports:
    - {name: metrics, port: 7777, targetPort: 7777}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-exporter
  namespace: fizcultor
spec:
  replicas: 1
  selector: {matchLabels: {app: nats-exporter}}
  template:
    metadata:
      labels: {app: nats-exporter}
    spec:
      containers:
        - name: nats-exporter
          image: natsio/prometheus-nats-exporter:0.15.0
          imagePullPolicy: IfNotPresent
          args:
            - -varz
            - -jsz=all
            - -connz
            - -subz
            - -channelz
            - -port=7777
            - http://nats:8222
          ports:
            - {name: metrics, containerPort: 7777}
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits:   {cpu: 100m, memory: 64Mi}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}

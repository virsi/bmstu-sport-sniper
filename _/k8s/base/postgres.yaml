# Postgres 16 как StatefulSet + per-service БД.
# Single-replica (single-node кластер). PVC 20Gi local-path.
# init-postgres.sh монтируется ConfigMap-ом → создаёт auth_db, bmstu_db,
# filter_db, teachers_db при первом запуске.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: fizcultor
data:
  00-init-databases.sh: |
    #!/bin/sh
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "${POSTGRES_DB:-postgres}" <<-EOSQL
      CREATE DATABASE auth_db;
      CREATE DATABASE bmstu_db;
      CREATE DATABASE filter_db;
      CREATE DATABASE teachers_db;
    EOSQL

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: fizcultor
  labels:
    app: postgres
spec:
  clusterIP: None # headless для stable DNS postgres-0.postgres
  selector:
    app: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: fizcultor
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: fizcultor
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fizcultor-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: pg
              containerPort: 5432
          readinessProbe:
            exec:
              command: [sh, -c, "pg_isready -U $POSTGRES_USER -d postgres"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits:   {cpu: 1, memory: 1Gi}
      volumes:
        - name: init
          configMap:
            name: postgres-init
            defaultMode: 0o755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi

# ⚠ ШАБЛОН — НЕ ПРИМЕНЯТЬ. Реальные секреты создаются через kubectl create
# secret (см. _/k8s/README.md). Этот файл — справочник полей.
#
# В git коммитится без значений. Реальные значения лежат вне репо.
apiVersion: v1
kind: Secret
metadata:
  name: fizcultor-secrets
  namespace: fizcultor
type: Opaque
stringData:
  # 64 hex chars (openssl rand -hex 32). Подписывает access/refresh JWT.
  JWT_SECRET: REPLACE_ME
  # 64 hex chars. Шифрует BMSTU creds at-rest (AES-256-GCM).
  AES_MASTER_KEY: REPLACE_ME
  # Postgres юзер прода. user=fizcultor by default.
  POSTGRES_PASSWORD: REPLACE_ME
  # Telegram bot token (BotFather).
  TG_BOT_TOKEN: REPLACE_ME
  # UUIDs семестра LKS на 4 группы здоровья.
  SEMESTER_UUID_BASIC: REPLACE_ME
  SEMESTER_UUID_PREPARATORY: REPLACE_ME
  SEMESTER_UUID_SPECIAL_MEDICAL: REPLACE_ME
  SEMESTER_UUID_AFK: REPLACE_ME
  # Grafana admin (логин = admin).
  GRAFANA_ADMIN_PASSWORD: REPLACE_ME

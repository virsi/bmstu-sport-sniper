name: fizcultor

x-go-svc: &go-svc
  build:
    context: ..
    dockerfile: deploy/Dockerfile.svc
  restart: unless-stopped
  env_file:
    - ../.env
  networks:
    - fizcultor-net
  depends_on:
    postgres:
      condition: service_healthy
    nats:
      condition: service_started

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fizcultor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fizcultor}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/00-init-databases.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fizcultor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fizcultor-net

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - fizcultor-net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - fizcultor-net
    depends_on:
      - gateway-svc

  # ---------- Application services ----------
  auth-svc:
    <<: *go-svc
    build:
      context: ..
      dockerfile: deploy/Dockerfile.svc
      args:
        SERVICE: auth-svc
    environment:
      SERVICE_NAME: auth-svc
      POSTGRES_DSN: postgres://${POSTGRES_USER:-fizcultor}:${POSTGRES_PASSWORD:-fizcultor}@postgres:5432/auth_db?sslmode=disable
    healthcheck:
      test: ["CMD", "/server", "--healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bmstu-svc:
    <<: *go-svc
    build:
      context: ..
      dockerfile: deploy/Dockerfile.svc
      args:
        SERVICE: bmstu-svc
    environment:
      SERVICE_NAME: bmstu-svc
      POSTGRES_DSN: postgres://${POSTGRES_USER:-fizcultor}:${POSTGRES_PASSWORD:-fizcultor}@postgres:5432/bmstu_db?sslmode=disable

  filter-svc:
    <<: *go-svc
    build:
      context: ..
      dockerfile: deploy/Dockerfile.svc
      args:
        SERVICE: filter-svc
    environment:
      SERVICE_NAME: filter-svc
      POSTGRES_DSN: postgres://${POSTGRES_USER:-fizcultor}:${POSTGRES_PASSWORD:-fizcultor}@postgres:5432/filter_db?sslmode=disable

  teachers-svc:
    <<: *go-svc
    build:
      context: ..
      dockerfile: deploy/Dockerfile.svc
      args:
        SERVICE: teachers-svc
    environment:
      SERVICE_NAME: teachers-svc
      POSTGRES_DSN: postgres://${POSTGRES_USER:-fizcultor}:${POSTGRES_PASSWORD:-fizcultor}@postgres:5432/teachers_db?sslmode=disable

  notifier-svc:
    <<: *go-svc
    build:
      context: ..
      dockerfile: deploy/Dockerfile.svc
      args:
        SERVICE: notifier-svc
    environment:
      SERVICE_NAME: notifier-svc

  poller-svc:
    <<: *go-svc
    build:
      context: ..
      dockerfile: deploy/Dockerfile.svc
      args:
        SERVICE: poller-svc
    environment:
      SERVICE_NAME: poller-svc
    depends_on:
      bmstu-svc:
        condition: service_started
      filter-svc:
        condition: service_started
      notifier-svc:
        condition: service_started

  gateway-svc:
    <<: *go-svc
    build:
      context: ..
      dockerfile: deploy/Dockerfile.svc
      args:
        SERVICE: gateway-svc
    environment:
      SERVICE_NAME: gateway-svc
    ports:
      - "8080:8080"
    depends_on:
      auth-svc:
        condition: service_started
      bmstu-svc:
        condition: service_started
      filter-svc:
        condition: service_started
      notifier-svc:
        condition: service_started
      teachers-svc:
        condition: service_started
      nats:
        condition: service_started

  # ---------- Observability ----------
  # Включается тем же compose, что и приложения — `make up` поднимает всё.
  # Dev-конфиг проще, чем prod: не read-only, без resource limits, без
  # отдельного nodename label. Дашборды и scrape-config — те же.

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - fizcultor-net

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - fizcultor-net
    depends_on:
      - prometheus

  # На macOS Docker Desktop mount propagation `rslave` не поддерживается
  # (path / is not a shared or slave mount) — для dev монтируем `:ro` без
  # propagation. Filesystem-метрики будут отражать VM Docker Desktop, не
  # реальный mac — этого достаточно для дашбордов и проверки запросов.
  # В prod (Linux хост) — см. docker-compose.prod.yaml с `:ro,rslave`.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    ports:
      - "9100:9100"
    networks:
      - fizcultor-net

  # cAdvisor — на macOS Docker Desktop запускается в VM, docker.sock проксится
  # через `/var/run/docker.sock`. `--docker_only` снят: cgroups контейнеров
  # доступны через systemd-factory (raw) даже без рабочей Docker-factory.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    command:
      - --housekeeping_interval=15s
      - --disable_metrics=disk,udp,sched,process,hugetlb,tcp,advtcp,referenced_memory,cpu_topology,resctrl
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    devices:
      - /dev/kmsg
    ports:
      - "8081:8080"
    networks:
      - fizcultor-net

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "host=postgres port=5432 user=${POSTGRES_USER:-fizcultor} password=${POSTGRES_PASSWORD:-fizcultor} dbname=postgres sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
      PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1"
    ports:
      - "9187:9187"
    networks:
      - fizcultor-net
    depends_on:
      postgres:
        condition: service_healthy

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.15.0
    restart: unless-stopped
    command:
      - -varz
      - -jsz=all
      - -connz
      - -subz
      - -channelz
      - -port=7777
      - http://nats:8222
    ports:
      - "7777:7777"
    networks:
      - fizcultor-net
    depends_on:
      - nats

networks:
  fizcultor-net:
    driver: bridge

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:

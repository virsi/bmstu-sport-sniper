# Provisioning datasources для Grafana.
#
# Это auto-applied при старте Grafana: путь /etc/grafana/provisioning/datasources/
# монтируется из compose, Grafana при boot читает YAML-файлы и создаёт
# или обновляет datasources без UI.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: "POST"

version: "2"
# Конфигурация sqlc для генерации БД-кода по сервисам.
# Активные секции включаются по мере появления миграций и queries.

sql:
  - engine: postgresql
    queries: services/auth-svc/sql/queries
    schema: migrations/auth_db
    gen:
      go:
        package: store
        out: services/auth-svc/internal/store
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: false
        emit_prepared_queries: false
        emit_pointers_for_null_types: true

  - engine: postgresql
    queries: services/bmstu-svc/sql/queries
    schema: migrations/bmstu_db
    gen:
      go:
        package: store
        out: services/bmstu-svc/internal/store
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: false
        emit_prepared_queries: false
        emit_pointers_for_null_types: true



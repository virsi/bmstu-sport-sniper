# nginx config для SPA. Все маршруты падают в /index.html чтобы Vue Router
# мог их обработать на клиенте. Статика отдаётся с long-cache.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Статика с hash в имени → forever-cache.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA-fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip для текстовых типов.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
